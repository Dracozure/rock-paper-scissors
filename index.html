<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="./index.css">
        <script src="./index.js" defer></script>
    </head>

    <body>
        <div class="rock-paper-scissors container">
            <div class="display">
                <div class="player details">
                    <h2 id="player-score">Score: 0</h2>
                    <div class="player stats">
                        <h2 id="player-choice">CHOICE</h2>
                        <img src="./img/duff.webp">
                        <h1>Player</h1>
                    </div>
                </div>
                <div class="computer details">
                    <div class="computer stats">
                        <h2 id="computer-choice">CHOICE</h2>
                        <img src="./img/newjeans-rabbit.jpeg">
                        <h1>Computer (Always stays in the middle)</h1>
                    </div>
                    <h2 id="computer-score">Score: 0</h2>
                </div>
            </div>
            <section id="display-choices" class="display choices">
                <div class="rock container">
                    <img src="./img/rock.webp">
                    <button id="rock">Rock</button>
                </div>
                <div class="paper container">
                    <img src="./img/paper.jpg">
                    <button id="paper">Paper</button>
                </div>
                <div class="scissors container">
                    <img src="./img/scissors.gif">
                    <button id="scissors">Scissors</button>
                </div>
            </section>
        </div>
    </body>
</html>
